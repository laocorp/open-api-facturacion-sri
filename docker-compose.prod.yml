# =================================================
# Docker Compose — Open API Facturación SRI
# Despliegue TODO-EN-UNO (PostgreSQL + Redis + Carbone + API)
# =================================================
# Uso: docker compose -f docker-compose.prod.yml up -d
# =================================================

services:
  # ─── PostgreSQL 16 ───
  postgres:
    image: postgres:16-alpine
    container_name: sri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-db_sri}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio}
    volumes:
      - postgres_data_new:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - '5449:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_sri}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ─── Redis 7 (BullMQ + Cache) ───
  redis:
    image: redis:7-alpine
    container_name: sri-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD es obligatorio}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─── Carbone.io (Generación de PDFs) ───
  carbone:
    image: carbone/carbone-ee:latest
    container_name: sri-carbone
    restart: unless-stopped
    environment:
      CARBONE_VERBOSE: 'false'
    ports:
      - '3006:4000'
    healthcheck:
      test: ["CMD-SHELL", "grep -q '0FA0' /proc/net/tcp || grep -q '0FA0' /proc/net/tcp6"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─── API NestJS ───
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-api-facturacion-sri:latest
    container_name: sri-api
    restart: unless-stopped
    environment:
      # ─── Server ───
      NODE_ENV: production
      PORT: 3001
      PUBLIC_URL: ${PUBLIC_URL}
      # ─── Database (internal compose network) ───
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-db_sri}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: ${DB_SSL:-false}
      # ─── Redis (internal compose network) ───
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      # ─── Carbone (internal compose network) ───
      CARBONE_API: http://carbone:4000
      CARBONE_DEBUG: ${CARBONE_DEBUG:-false}
      CARBONE_CONVERT_TO: ${CARBONE_CONVERT_TO:-pdf}
      # ─── Directories (inside container) ───
      TEMPLATES_DIR: /data/templates
      PDFS_DIR: /data/pdfs
      CERTS_DIR: /data/certs
      XMLS_DIR: /data/xmls
      # ─── JWT ───
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-8h}
      # ─── Encryption ───
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_SALT: ${ENCRYPTION_SALT}
      # ─── SRI Ecuador ───
      SRI_ENVIRONMENT: ${SRI_ENVIRONMENT:-development}
      SRI_RECEPTION_WSDL: ${SRI_RECEPTION_WSDL}
      SRI_AUTHORIZATION_WSDL: ${SRI_AUTHORIZATION_WSDL}
      SRI_SIGNATURE_CERT_PASSWORD: ${SRI_SIGNATURE_CERT_PASSWORD:-}
      # ─── CORS / Rate limiting ───
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
    ports:
      - '${PORT:-3005}:3001'
    volumes:
      - templates_data:/data/templates
      - pdfs_data:/data/pdfs
      - certs_data:/data/certs
      - xmls_data:/data/xmls
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      carbone:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/status']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  postgres_data_new:
    driver: local
  redis_data:
    driver: local
  templates_data:
    driver: local
  pdfs_data:
    driver: local
  certs_data:
    driver: local
  xmls_data:
    driver: local
