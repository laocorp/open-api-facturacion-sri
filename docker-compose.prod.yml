# =================================================
# Docker Compose — Open API Facturación SRI
# Despliegue TODO-EN-UNO (PostgreSQL + Redis + Carbone + API)
# =================================================
# Uso: docker compose -f docker-compose.prod.yml up -d
# =================================================

services:
  # ─── PostgreSQL 16 ───
  postgres:
    image: postgres:16-alpine
    container_name: sri-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-db_sri}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD es obligatorio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - '5449:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-db_sri}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ─── Redis 7 (BullMQ + Cache) ───
  redis:
    image: redis:7-alpine
    container_name: sri-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD es obligatorio}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─── Carbone.io (Generación de PDFs) ───
  carbone:
    image: carboneio/carbone:latest
    container_name: sri-carbone
    restart: unless-stopped
    environment:
      CARBONE_VERBOSE: 'false'
    ports:
      - '3006:3000'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/version']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: 'json-file'
      options:
        max-size: '5m'
        max-file: '3'

  # ─── API NestJS ───
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: open-api-facturacion-sri:latest
    container_name: sri-api
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CARBONE_API: http://carbone:3000
    ports:
      - '${PORT:-3005}:3001'
    volumes:
      - templates_data:/data/templates
      - pdfs_data:/data/pdfs
      - certs_data:/data/certs
      - xmls_data:/data/xmls
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      carbone:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/status']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  templates_data:
    driver: local
  pdfs_data:
    driver: local
  certs_data:
    driver: local
  xmls_data:
    driver: local
